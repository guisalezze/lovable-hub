services:
  api:
    build: ./server
    container_name: crm-connect-api
    ports:
      - "3000:3000"
    env_file:
      - ./server/.env
    environment:
      PORT: 3000
      NODE_ENV: production
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    volumes:
      # Persistir logs locais (opcional)
      - ./logs:/app/logs
